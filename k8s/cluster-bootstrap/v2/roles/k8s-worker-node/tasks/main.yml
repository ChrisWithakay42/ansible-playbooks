---
- name: Read join command from local file
  ansible.builtin.slurp:
    src: /tmp/k8s_join_command
  register: join_command_raw
  delegate_to: localhost

- name: Decode join command
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw['content'] | b64decode | trim }}"

- name: Join the cluster
  ansible.builtin.command: "{{ join_command }}"
  when: join_command is defined and join_command != ""

- name: Check if node has joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Fail if node has not joined
  ansible.builtin.fail:
    msg: "Node has not joined the cluster"
  when: not kubelet_conf.stat.exists
