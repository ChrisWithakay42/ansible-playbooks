---
- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadmin_conf

- name: Initialize the Kubernetes cluster
  ansible.builtin.command: >-
    kubeadm init --pod-network-cidr={{ pod_network_cidr }}
    --kubernetes-version={{ k8s_version }}
    --skip-phases=addon/kube-proxy
  when: not kubeadmin_conf.stat.exists

- name: Create .kube directory for root user
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: '0750'
  when: not kubeadmin_conf.stat.exists

- name: Copy admin.conf to root's .kube directory
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    owner: root
    group: root
    mode: '0600'
  when: not kubeadmin_conf.stat.exists

- name: Get the join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  when: not kubeadmin_conf.stat.exists

- name: Store the join command
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"
  when: not kubeadmin_conf.stat.exists

- name: Add join command to a local file
  ansible.builtin.lineinfile:
    path: "/tmp/k8s_join_command"
    line: "{{ join_command_raw.stdout }}"
    create: yes
  delegate_to: localhost
  when: not kubeadmin_conf.stat.exists
