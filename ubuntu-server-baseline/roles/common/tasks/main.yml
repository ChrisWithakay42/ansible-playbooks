---
# tasks file for common role

- name: "1.1.1 Ensure mounting of cramfs filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/cramfs.conf
    line: "install cramfs /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.2 Ensure mounting of freevxfs filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/freevxfs.conf
    line: "install freevxfs /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.3 Ensure mounting of jffs2 filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/jffs2.conf
    line: "install jffs2 /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.4 Ensure mounting of hfs filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/hfs.conf
    line: "install hfs /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.5 Ensure mounting of hfsplus filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/hfsplus.conf
    line: "install hfsplus /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.6 Ensure mounting of squashfs filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/squashfs.conf
    line: "install squashfs /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.7 Ensure mounting of udf filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/udf.conf
    line: "install udf /bin/true"
    create: yes
    mode: '0644'

- name: "1.1.8 Ensure mounting of vfat filesystems is disabled (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/vfat.conf
    line: "install vfat /bin/true"
    create: yes
    mode: '0644'

- name: "1.3.1 Ensure AppArmor is installed (Automated)"
  ansible.builtin.package:
    name:
      - apparmor
      - apparmor-utils
    state: present

- name: "1.3.2 Ensure sudo is installed (Automated)"
  ansible.builtin.package:
    name: sudo
    state: present

- name: "1.3.3 Ensure sudo is configured to use pty (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "Defaults use_pty"
    validate: /usr/sbin/visudo -cf %s

- name: "1.3.4 Ensure sudo log file exists (Automated)"
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "Defaults logfile=/var/log/sudo.log"
    validate: /usr/sbin/visudo -cf %s

- name: "1.4.1 Ensure AIDE is installed (Automated)"
  ansible.builtin.package:
    name: aide
    state: present

- name: "1.4.1 Ensure AIDE is initialized (Automated)"
  ansible.builtin.command:
    cmd: aideinit
    creates: /var/lib/aide/aide.db.new
  register: aide_init

- name: "1.4.1 Move AIDE database into place"
  ansible.builtin.command:
    cmd: mv /var/lib/aide/aide.db.new /var/lib/aide/aide.db
  when: aide_init.changed

- name: "1.4.2 Ensure filesystem integrity is regularly checked (Automated)"
  ansible.builtin.cron:
    name: "AIDE check"
    minute: "0"
    hour: "5"
    job: "/usr/bin/aide.wrapper --config /etc/aide/aide.conf --check"
    user: root
    cron_file: aide
