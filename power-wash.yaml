---
# ==========================================
# PLAY 1: THE NUKE (Power-Wash)
# ==========================================
- name: Force Nuke K8s Cluster (V2 - Force Mode)
  hosts: k8s_cluster
  become: true
  vars:
    ansible_user: "pi" # Ensure this matches your Pi user
  tasks:
    - name: 1. Unhold K8s packages (Fixes Apt Error)
      shell: apt-mark unhold kubelet kubeadm kubectl kubernetes-cni containerd
      failed_when: false

    - name: 2. Force Unmount everything in /var/lib/kubelet
      shell: |
        for m in $(mount | grep /var/lib/kubelet | awk '{print $3}'); do
          umount -f -l $m
        done
      failed_when: false

    - name: 3. Kill any lingering container processes
      shell: |
        pkill -9 kubelet || true
        pkill -9 containerd || true
        pkill -9 docker || true
      failed_when: false

    - name: 4. Force Remove Binary and Config Directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/etcd
        - /var/lib/k3s
        - /etc/rancher
        - /var/lib/rancher
        - /var/lib/containerd
        - /etc/containerd
        - /var/run/kubernetes
        - /etc/cni/net.d
        - "/home/{{ ansible_user }}/.kube"
      failed_when: false

    - name: 5. Cleanup APT Packages (With Force)
      apt:
        name: 
          - kubelet
          - kubeadm
          - kubectl
          - kubernetes-cni
          - containerd
          - docker-ce
          - cri-tools
        state: absent
        purge: true
        autoremove: true
      register: apt_res
      until: apt_res is success
      retries: 3
      delay: 5

    - name: 6. Flush Networking (Iptables/IPVS)
      shell: |
        iptables -F && iptables -t nat -F && iptables -t mangle -F && iptables -X
        ip link delete cni0 || true
        ip link delete flannel.1 || true
        ip link delete weave || true
        ip link delete kube-ipvs0 || true
        ip link delete cilium_host || true
        ip link delete cilium_net || true
        ip link delete cilium_vxlan || true
      failed_when: false

    - name: 7. Delete Kubeconfig from local host to prevent conflicts
      delegate_to: localhost
      become: false  # Runs as your local Mac/Linux user, not root
      file:
        path: "~/.kube/config"
        state: absent
      run_once: true

    - name: 8. Final Reboot
      reboot:
        msg: "Rebooting to ensure all kernel hooks and busy devices are cleared."

# ==========================================
# PLAY 2: PREPARE NODES (REINSTALL)
# ==========================================
- name: 2. Prepare Pi 5 Nodes (All Nodes)
  hosts: k8s_cluster
  become: true
  vars:
    k8s_version: "v1.31"
    ansible_user: "pi"
  tasks:
    - name: 0. EMERGENCY CLEANUP - Remove all conflicting K8s repo files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/sources.list.d/kubernetes-apt-keyring.list
        - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        - /etc/apt/keyrings/kubernetes-apt-keyring.asc
        - /etc/apt/sources.list.d/archive_uri-https_pkgs_k8s_io_core_stable_v1_31_deb_-noble.list

    - name: 1. Hardware - Optimize cmdline.txt (NVMe Stability + K8s Cgroups)
      replace:
        path: /boot/firmware/cmdline.txt
        regexp: '^([\w](?!.*{{ item }}).*)$'
        replace: '\1 {{ item }}'
      loop:
        - "pcie_aspm=off"
        - "nvme_core.default_ps_max_latency_us=0"
        - "cgroup_enable=cpuset"
        - "cgroup_enable=memory"
        - "cgroup_memory=1"
      register: cmdline_txt

    - name: 2. OS - Disable Swap
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab
      when: ansible_swaptotal_mb > 0
      ignore_errors: true

    - name: 3. Network - Load Kernel Modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: 4. Network - Apply modprobe
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: 5. Network - Sysctl bridge settings
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }

    - name: 6. Install Containerd, Networking, and Storage Tools
      apt:
        name: [containerd, conntrack, socat, ipset, ethtool, ebtables, open-iscsi, nfs-common, jq]
        state: present
        update_cache: yes

    - name: 7. Configure Containerd (SystemdCgroup)
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      notify: Restart Containerd

    - name: 8. K8s - Add Repository GPG Key
      get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'

    - name: 9. K8s - Add Repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"
        filename: kubernetes
        state: present

    - name: 10. K8s - Install Kubelet, Kubeadm, Kubectl
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes

    - name: 11. K8s - Hold Packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

  handlers:
    - name: Restart Containerd
      service:
        name: containerd
        state: restarted

# ==========================================
# PLAY 3: INIT CONTROL PLANE
# ==========================================
- name: 3. Initialize Control Plane
  hosts: control_plane
  become: true
  vars:
    pod_network_cidr: "10.244.0.0/16"
    ansible_user: "pi"
  tasks:
    - name: Kubeadm Init (Skipping kube-proxy for manual setup)
      command: >
        kubeadm init 
        --pod-network-cidr={{ pod_network_cidr }} 
        --skip-phases=addon/kube-proxy
      register: kubeadm_init

    - name: Setup kubeconfig for user
      shell: |
        mkdir -p /home/{{ ansible_user }}/.kube
        cp -i /etc/kubernetes/admin.conf /home/{{ ansible_user }}/.kube/config
        chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config

    - name: Generate Join Token
      command: kubeadm token create --print-join-command
      register: join_command

# ==========================================
# PLAY 4: JOIN WORKERS
# ==========================================
- name: 4. Join Workers
  hosts: workers
  become: true
  tasks:
    - name: Run Join Command
      command: "{{ hostvars[groups['control_plane'][0]]['join_command'].stdout }}"

# ==========================================
# PLAY 5: FINALIZE & LOCAL ACCESS
# ==========================================
- name: 5. Finalize Cluster
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Copy kubeconfig to local machine (~/.kube/config)
      fetch:
        src: "/etc/kubernetes/admin.conf"
        dest: "~/.kube/config"
        flat: yes
      become: true

    - name: Power-Wash Result
      debug:
        msg: "Cluster rebuilt. Kube-proxy is NOT installed. Your local ~/.kube/config has been updated."
